<!DOCTYPE html>
<html lang="en">
<head>
  <!-- API: auto-detects local vs Render backend -->
  <script>
    window.API_BASE = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1")
      ? ""
      : "https://YOUR-APP-NAME.onrender.com"; // ← replace with your Render URL
  </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KWBA Agency - Client Portal</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; line-height: 1.6; }
        .upload-card { border: 2px dashed #ccc; padding: 40px; text-align: center; border-radius: 10px; cursor: pointer; }
        .upload-card:hover { border-color: #333; background: #fafafa; }
        #status { margin-top: 20px; padding: 10px; display: none; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; border-radius: 5px; }
        select { padding: 10px; width: 100%; margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>KWBA Agency Client Portal</h1>
    <p>Please upload logos, brand guidelines, or ad assets for your campaign.</p>

    <select id="asset-tag">
        <option value="logo">Logo</option>
        <option value="brand">Brand Guidelines / Font</option>
        <option value="ads">Ad Image / Creative</option>
        <option value="other">Other Asset</option>
    </select>

    <div class="upload-card" onclick="document.getElementById('fileInput').click()" id="dropZone">
        <p>Click or Drag & Drop to upload</p>
        <input type="file" id="fileInput" style="display:none" onchange="handleFile(this.files[0])">
    </div>

    <div id="status"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const briefId = urlParams.get('id');

        if (!briefId) {
            document.body.innerHTML = "<h1>Error</h1><p>No Brief ID provided. Please use the link sent by your agency.</p>";
        }

        const dropZone = document.getElementById("dropZone");
        dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.style.background = "#eee"; });
        dropZone.addEventListener("dragleave", () => { dropZone.style.background = "transparent"; });
        dropZone.addEventListener("drop", e => {
            e.preventDefault();
            dropZone.style.background = "transparent";
            handleFile(e.dataTransfer.files[0]);
        });

        async function handleFile(file) {
            if (!file) return;
            const tag = document.getElementById("asset-tag").value;
            const status = document.getElementById("status");
            status.style.display = "block";
            status.textContent = "Uploading " + file.name + "...";
            status.className = "";

            const formData = new FormData();
            formData.append("file", file);

            try {
                const res = await fetch(window.API_BASE + '/client/upload', {
                    method: "POST",
                    body: formData
                });
                const data = await res.json();

                await fetch(window.API_BASE + '/client/save-file', {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        briefId: briefId,
                        name: data.name,
                        url: data.url,
                        tag: tag
                    })
                });

                status.textContent = "Success! Asset '" + file.name + "' uploaded as '" + tag + "'.";
                status.className = "success";
            } catch (e) {
                status.textContent = "Upload failed. Please try again.";
                console.error(e);
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<script src="/assets/api-config.js"></script>
  <!-- API: localhost -> same origin (relative); deployed -> same origin -->
  
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#fafaf7"/>
  <title>Login — KWBA Agency</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Inter:wght@300;400;500;600;700&family=Inter+Tight:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
  --bg:#fafaf7;--bg2:#f0ede7;--bg3:#e8e5de;--bg4:#dedad2;
  --surface-1:#f0ede7;--surface-2:#e8e5de;
  --gold:#b08a2e;--gold-deep:#8d6f24;--gold-hover:#967729;
  --gold-dim:rgba(176,138,46,0.07);--gold-border:rgba(176,138,46,0.30);--gold-strong:rgba(176,138,46,0.55);
  --ink:#1a1814;--ink2:#5a554d;
  --text-primary:#1a1814;--text-secondary:#5a554d;--text-tertiary:#8a857a;--text-disabled:#b5b1a4;
  --muted:#8a857a;--muted2:#b5b1a4;
  --border:rgba(26,24,20,0.08);--border2:rgba(26,24,20,0.05);--border-strong:rgba(26,24,20,0.18);
  --red:#c0392b;--green:#27ae60;--blue:#2980b9;
  --shadow-sm:0 1px 3px rgba(26,24,20,0.06),0 1px 2px rgba(26,24,20,0.04);
  --font-sans:'Inter',-apple-system,BlinkMacSystemFont,'SF Pro Text',system-ui,sans-serif;
  --font-display:'Inter Tight','Inter',-apple-system,system-ui,sans-serif;
}
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    @keyframes bgShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
    body{
      background:var(--bg);
      color:var(--text-primary);
      font-family:'Inter',-apple-system,BlinkMacSystemFont,'SF Pro Text',system-ui,sans-serif;
      -webkit-font-smoothing:antialiased;
      display:flex;align-items:center;justify-content:center;
      min-height:100vh;padding:20px;
      background-image:
        radial-gradient(circle at 15% 15%, rgba(176,138,46,0.07), transparent 45%),
        radial-gradient(circle at 85% 85%, rgba(176,138,46,0.06), transparent 45%),
        radial-gradient(circle at 50% 50%, rgba(176,138,46,0.03), transparent 60%);
    }
    .box{
      width:100%;max-width:400px;padding:52px 44px;
      background:#fff;border:1px solid var(--border);
      border-radius:16px;
      box-shadow:0 4px 6px -1px rgba(26,24,20,0.04),0 20px 60px -20px rgba(26,24,20,0.10),0 0 0 1px rgba(176,138,46,0.06);
      text-align:center;position:relative;
      animation:fadeUp .55s cubic-bezier(0.4,0,0.2,1) both;
    }
    .box::before{
      content:'';position:absolute;top:0;left:10%;right:10%;height:1px;
      background:linear-gradient(90deg,transparent,rgba(176,138,46,0.45),transparent);
      border-radius:1px;
    }
    .badge{
      font-size:9px;letter-spacing:.28em;text-transform:uppercase;
      color:var(--gold);margin-bottom:20px;
      display:inline-flex;align-items:center;gap:10px;
    }
    .badge::before,.badge::after{content:'';display:block;width:20px;height:1px;background:var(--gold);opacity:.45}
    h1{
      font-family:'Inter Tight','Inter',system-ui,sans-serif;font-weight:600;
      font-size:30px;line-height:1.1;margin-bottom:8px;letter-spacing:-.025em;
      color:var(--text-primary);
    }
    h1 em{font-style:italic;color:var(--gold);font-weight:inherit}
    p.sub{font-size:13.5px;color:var(--text-tertiary);margin-bottom:32px;line-height:1.5}
    .form-group{margin-top:18px;text-align:left}
    .form-group:first-of-type{margin-top:0}
    label{
      display:block;font-size:10px;
      letter-spacing:.14em;text-transform:uppercase;
      color:var(--text-tertiary);margin-bottom:7px;font-weight:500;
    }
    input{
      width:100%;background:var(--bg);
      border:1px solid var(--border-strong);
      border-radius:8px;
      color:var(--text-primary);padding:13px 16px;
      font-family:inherit;font-size:14px;font-weight:400;
      outline:none;
      transition:border-color .2s cubic-bezier(0.4,0,0.2,1),box-shadow .2s cubic-bezier(0.4,0,0.2,1);
    }
    input::placeholder{color:var(--text-disabled)}
    input:focus{
      border-color:var(--gold);
      box-shadow:0 0 0 3px rgba(176,138,46,0.10);
    }
    button{
      width:100%;
      background:var(--gold);color:#fff;
      border:none;padding:14px 20px;margin-top:26px;
      border-radius:8px;
      font-weight:500;cursor:pointer;
      font-size:14px;letter-spacing:.02em;
      font-family:inherit;
      transition:background .2s,transform .15s cubic-bezier(0.4,0,0.2,1),box-shadow .2s;
      box-shadow:0 1px 0 rgba(255,255,255,0.15) inset,0 4px 14px -4px rgba(176,138,46,0.35);
    }
    button:hover{background:var(--gold-hover);transform:translateY(-1px);box-shadow:0 1px 0 rgba(255,255,255,0.15) inset,0 8px 20px -4px rgba(176,138,46,0.4)}
    button:active{transform:translateY(0);transition-duration:.08s}
    button:disabled{opacity:.55;cursor:wait;transform:none}
    .msg{
      font-size:12.5px;margin-top:16px;padding:11px 14px;
      display:none;text-align:left;
      border:1px solid;border-radius:7px;line-height:1.55;
    }
    .msg.err{display:block;color:#9b2c2c;border-color:rgba(155,44,44,0.2);background:rgba(155,44,44,0.04)}
    .msg.ok{display:block;color:#276749;border-color:rgba(39,103,73,0.2);background:rgba(39,103,73,0.05)}
    .hint{font-size:11px;color:var(--text-disabled);margin-top:24px;line-height:1.65}
    .hint code{background:rgba(176,138,46,0.07);padding:2px 6px;font-size:10.5px;border-radius:4px;color:var(--text-secondary)}
  </style>
</head>
<body>
  <div class="box">
    <a href="/" aria-label="KWBA Agency — Home" style="display:block;margin:0 auto 24px;max-width:96px">
      <img src="/assets/brand/primary-gold.svg" alt="KWBA Agency" style="width:100%;height:auto;display:block">
    </a>
    <h1>Agency <em>Access</em></h1>
    <p class="sub">Client Portal &amp; AI Hub Login</p>

    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" autocomplete="email" placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label for="pass">Password</label>
      <input type="password" id="pass" autocomplete="current-password" placeholder="Your password" onkeydown="if(event.key==='Enter')login()">
    </div>

    <button id="loginBtn" onclick="login()">Enter Agency OS</button>

    <div id="msg" class="msg"></div>

    <p style="text-align:center;margin-top:16px;font-size:13px;color:var(--text-secondary)">
      Forgot your password? <a href="mailto:hello@kwba-agency.com?subject=Password Reset Request" style="color:var(--gold);text-decoration:underline">Contact us</a>
    </p>

  </div>

<script>
function showMsg(text, kind){
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + (kind === 'ok' ? 'ok' : 'err');
}

async function login() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('pass').value;
  const btn = document.getElementById('loginBtn');

  if (!email || !password) {
    showMsg('Enter both email and password.', 'err');
    return;
  }

  btn.disabled = true;
  const origLabel = btn.textContent;
  btn.textContent = 'Signing in...';

  try {
    const res = await fetch(window.API_BASE + '/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });

    if (res.ok) {
      const data = await res.json();
      if (!data || !data.token) {
        showMsg('Login response was missing a token. Contact support.', 'err');
        return;
      }
      localStorage.setItem('agency_token', data.token);
      showMsg('Signed in. Redirecting...', 'ok');
      const target = data.role === 'admin' ? '/admin.html' : '/portal.html';
      setTimeout(() => { location.href = target; }, 250);
    } else if (res.status === 429) {
      showMsg('Too many login attempts. Please wait 15 minutes before trying again.', 'err');
      btn.disabled = false;
      btn.textContent = origLabel;
      return;
    } else if (res.status === 401) {
      showMsg('Invalid email or password.', 'err');
    } else {
      let body = '';
      try { body = await res.text(); } catch(_) {}
      showMsg('Server returned ' + res.status + (body ? ': ' + body.slice(0, 120) : ''), 'err');
    }
  } catch (err) {
    showMsg('Could not reach the login server. Check your connection or try again. (' + (err.message || 'network error') + ')', 'err');
    console.error('Login error:', err);
  } finally {
    btn.disabled = false;
    btn.textContent = origLabel;
  }
}

window.addEventListener('DOMContentLoaded', () => {
  const last = localStorage.getItem('last_login_email');
  if (last) document.getElementById('email').value = last;
});

document.getElementById('email').addEventListener('blur', e => {
  if (e.target.value) localStorage.setItem('last_login_email', e.target.value);
});
</script>
</body>
</html>

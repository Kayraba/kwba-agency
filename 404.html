<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <title>Page not found — KWBA Agency</title>
    <meta name="description" content="The page you're looking for doesn't exist. Head back to KWBA Agency — professional web design, Milton Keynes." />
    <meta name="robots" content="noindex, follow" />
    <meta name="theme-color" content="#141414" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; }
      body {
        font-family: 'DM Sans', 'Inter', sans-serif;
        background: #0f0e0c;
        color: #f0ece4;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 24px;
        text-align: center;
        -webkit-font-smoothing: antialiased;
        background-image:
          radial-gradient(circle at 20% 10%, rgba(201,168,76,0.08), transparent 45%),
          radial-gradient(circle at 80% 90%, rgba(201,168,76,0.05), transparent 45%);
      }
      .wrap { max-width: 680px; margin: 0 auto; }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 10px;
        letter-spacing: .28em;
        text-transform: uppercase;
        color: #c9a84c;
        margin-bottom: 28px;
        border: 1px solid rgba(201,168,76,0.25);
        padding: 6px 16px;
      }
      .dot {
        width: 6px;
        height: 6px;
        background: #c9a84c;
        border-radius: 50%;
        display: inline-block;
      }
      .code {
        font-family: 'Cormorant Garamond', Georgia, serif;
        font-size: clamp(90px, 18vw, 180px);
        font-weight: 400;
        line-height: 1;
        letter-spacing: -.03em;
        color: #c9a84c;
        margin-bottom: 12px;
      }
      h1 {
        font-family: 'Cormorant Garamond', Georgia, serif;
        font-size: clamp(32px, 5vw, 52px);
        font-weight: 400;
        line-height: 1.1;
        letter-spacing: -.02em;
        color: #f0ece4;
        margin-bottom: 20px;
      }
      h1 em { font-style: italic; color: #c9a84c; }
      p {
        font-size: 15px;
        color: #9a9488;
        line-height: 1.8;
        font-weight: 300;
        max-width: 520px;
        margin: 0 auto 36px;
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        justify-content: center;
        margin-bottom: 48px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        letter-spacing: .08em;
        text-transform: uppercase;
        font-weight: 400;
        padding: 14px 26px;
        text-decoration: none;
        transition: all .2s ease;
        border: 1px solid rgba(201,168,76,0.35);
      }
      .btn-primary {
        background: #c9a84c;
        color: #141414;
        border-color: #c9a84c;
      }
      .btn-primary:hover { background: #d4b660; border-color: #d4b660; }
      .btn-ghost {
        background: transparent;
        color: #ddd8ce;
      }
      .btn-ghost:hover { background: rgba(201,168,76,0.08); color: #f0ece4; }
      .links {
        border-top: 1px solid rgba(201,168,76,0.15);
        padding-top: 32px;
      }
      .links-label {
        font-size: 10px;
        letter-spacing: .28em;
        text-transform: uppercase;
        color: #9a9488;
        margin-bottom: 18px;
      }
      .link-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: center;
      }
      .link-grid a {
        font-size: 11px;
        letter-spacing: .12em;
        text-transform: uppercase;
        color: #ddd8ce;
        background: #1a1814;
        border: 1px solid rgba(201,168,76,0.18);
        padding: 9px 18px;
        font-weight: 300;
        text-decoration: none;
        transition: all .2s ease;
      }
      .link-grid a:hover {
        color: #c9a84c;
        border-color: rgba(201,168,76,0.45);
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <div class="badge"><span class="dot" aria-hidden="true"></span>Page not found</div>
      <div class="code" aria-hidden="true">404</div>
      <h1>This page has <em>wandered off</em></h1>
      <p>The link you followed may be broken, or the page may have moved. Let's get you back to something useful.</p>
      <div class="actions">
        <a class="btn btn-primary" href="/">Back to home</a>
        <a class="btn btn-ghost" href="/blog.html">Read the blog</a>
      </div>
      <div class="links">
        <div class="links-label">Popular pages</div>
        <div class="link-grid">
          <a href="/">Home</a>
          <a href="/blog.html">Blog</a>
          <a href="/marketing.html">AI Marketing Hub</a>
          <a href="/agent-lead-followup.html">Lead Follow-Up</a>
          <a href="/agent-seo-content.html">SEO Content</a>
          <a href="/agent-case-study.html">Case Studies</a>
        </div>
      </div>
    </main>
  </body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 52" role="img" aria-label="KWBA Agency">
  <!-- Geometric mark: two overlapping angular brackets forming a diamond-like K-shape -->
  <g transform="translate(0,4)">
    <!-- Top-left stroke -->
    <line x1="8" y1="22" x2="18" y2="4" stroke="#b08a2e" stroke-width="2.8" stroke-linecap="round"/>
    <!-- Bottom-left stroke -->
    <line x1="8" y1="22" x2="18" y2="40" stroke="#b08a2e" stroke-width="2.8" stroke-linecap="round"/>
    <!-- Cross arm top -->
    <line x1="18" y1="13" x2="26" y2="22" stroke="#b08a2e" stroke-width="2.8" stroke-linecap="round"/>
    <!-- Cross arm bottom -->
    <line x1="18" y1="31" x2="26" y2="22" stroke="#b08a2e" stroke-width="2.8" stroke-linecap="round"/>
    <!-- Thin accent bar -->
    <line x1="8" y1="22" x2="26" y2="22" stroke="#b08a2e" stroke-width="1.2" stroke-linecap="round" opacity="0.35"/>
  </g>
  <!-- Wordmark -->
  <text x="38" y="37" text-anchor="start"
        font-family="Inter Tight, Inter, system-ui, sans-serif"
        font-weight="800" font-size="26"
        fill="#1a1814" letter-spacing="-0.04em">KWBA</text>
  <!-- Divider dot -->
  <circle cx="143" cy="35" r="2.2" fill="#b08a2e"/>
  <!-- Agency label -->
  <text x="151" y="36" text-anchor="start"
        font-family="Inter, system-ui, sans-serif"
        font-weight="500" font-size="9.5" fill="#1a1814"
        letter-spacing="0.22em" opacity="0.5">AGENCY</text>
</svg>

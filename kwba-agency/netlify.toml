[build]
  publish = "."

[[redirects]]
  from = "/portal"
  to = "/portal.html"
  status = 200

[[redirects]]
  from = "/login"
  to = "/login.html"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

[[redirects]]
  from = "/blog"
  to = "/blog.html"
  status = 200

[[redirects]]
  from = "/brief"
  to = "/brief.html"
  status = 200

[[redirects]]
  from = "/client"
  to = "/client.html"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "https://kwba-agency.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/public-brief"
  to = "https://kwba-agency.onrender.com/public-brief"
  status = 200
  force = true

[[redirects]]
  from = "/login"
  to = "https://kwba-agency.onrender.com/login"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

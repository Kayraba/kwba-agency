<!DOCTYPE html>
<html lang="en">
<head>
<script src="/assets/api-config.js"></script>
  <!-- API: auto-detects local vs Render backend -->
  
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start Your Project — KWBA Agency</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Inter+Tight:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{
  --bg:#fafaf7;--bg2:#f0ede7;--bg3:#e8e5de;--bg4:#dedad2;
  --surface-1:#f0ede7;--surface-2:#e8e5de;
  --gold:#b08a2e;--gold-deep:#8d6f24;--gold-hover:#967729;
  --gold-dim:rgba(176,138,46,0.07);--gold-border:rgba(176,138,46,0.30);--gold-strong:rgba(176,138,46,0.55);
  --ink:#1a1814;--ink2:#5a554d;
  --text-primary:#1a1814;--text-secondary:#5a554d;--text-tertiary:#8a857a;--text-disabled:#b5b1a4;
  --muted:#8a857a;--muted2:#b5b1a4;
  --border:rgba(26,24,20,0.08);--border2:rgba(26,24,20,0.05);--border-strong:rgba(26,24,20,0.18);
  --red:#c0392b;--green:#27ae60;--blue:#2980b9;
  --shadow-sm:0 1px 3px rgba(26,24,20,0.06),0 1px 2px rgba(26,24,20,0.04);
  --font-sans:'Inter',-apple-system,BlinkMacSystemFont,'SF Pro Text',system-ui,sans-serif;
  --font-display:'Inter Tight','Inter',-apple-system,system-ui,sans-serif;
}
        body { background: var(--bg); color:var(--text-primary); font-family: 'Inter',-apple-system,BlinkMacSystemFont,'SF Pro Text',system-ui,sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; }
        header { padding: 20px; border-bottom: 1px solid var(--border); text-align: center; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 80%; padding: 12px 18px; border-radius: 12px; font-size: 15px; line-height: 1.5; }
        .ai { background: var(--bg2); align-self: flex-start; border: 1px solid var(--border); color: var(--ink); border-bottom-left-radius: 2px; }
        .user { background: var(--gold); color: black; align-self: flex-end; border-bottom-right-radius: 2px; font-weight: 500; }
        #input-area { padding: 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; background: var(--bg); }
        input { flex: 1; background: var(--bg2); border: 1px solid var(--border); color:var(--text-primary); padding: 14px; border-radius: 8px; outline: none; }
        button { background: var(--gold); border: none; color: black; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .typing { font-style: italic; color: #666; font-size: 12px; margin-bottom: 5px; }
    </style>
</head>
<body>
<nav style="position:sticky;top:0;z-index:100;background:rgba(250,250,247,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(26,24,20,0.08);padding:0 40px;height:64px;display:flex;align-items:center;">
  <a href="/" style="display:flex;align-items:center;text-decoration:none;">
    <img src="/assets/brand/logo-nav.svg" alt="KWBA Agency" style="height:22px;width:auto;display:block;">
  </a>
</nav>
    <header>
        <span style="color: var(--gold); font-weight: bold; letter-spacing: 2px;">KWBA AGENCY</span>
    </header>

    <div id="chat-container">
        <div class="msg ai">Hello! I'm the KWBA onboarding assistant. I'll help you define your project brief in just a few minutes. To start, what is the name of your business?</div>
    </div>

    <div id="input-area">
        <input type="text" id="user-input" placeholder="Type your answer..." onkeydown="if(event.key==='Enter')sendMsg()">
        <button onclick="sendMsg()">Send</button>
    </div>

    <script>
        const chat = document.getElementById('chat-container');
        const input = document.getElementById('user-input');
        
        let step = 0;
        let briefData = {
            bizName: "",
            bizDesc: "",
            goal: "",
            targetAudience: "",
            briefType: "website" // Default
        };

        const questions = [
            "Great! What does your business do? (Brief description)",
            "What is the main goal of this project? (e.g., Get more leads, sell products, brand awareness)",
            "Who is your ideal customer or target audience?",
            "What type of project is this? (Type 'Website' or 'Marketing')"
        ];

        function addMsg(text, type) {
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.textContent = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        async function sendMsg() {
            const val = input.value.trim();
            if (!val) return;
            addMsg(val, 'user');
            input.value = '';

            // Save data based on step
            if (step === 0) briefData.bizName = val;
            else if (step === 1) briefData.bizDesc = val;
            else if (step === 2) briefData.goal = val;
            else if (step === 3) briefData.targetAudience = val;
            else if (step === 4) briefData.briefType = val.toLowerCase();

            step++;

            if (step <= questions.length) {
                setTimeout(() => addMsg(questions[step-1], 'ai'), 600);
            } else {
                setTimeout(() => finishIntake(), 600);
            }
        }

        async function finishIntake() {
            addMsg("Thank you! I'm saving your brief and preparing your project dashboard...", 'ai');
            
            try {
                const res = await fetch(window.API_BASE + '/public-brief', {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(briefData)
                });
                if (res.ok) {
                    addMsg("Everything is ready! Our team has been notified. You can close this window now.", 'ai');
                } else {
                    addMsg("There was a slight error saving. Please refresh and try again.", 'ai');
                }
            } catch(e) {
                addMsg("Connection error. Please check your internet.", 'ai');
            }
        }
    </script>
</body>
</html>

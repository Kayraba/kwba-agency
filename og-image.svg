<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0f0e0c"/>
  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(201,168,76,0.06)" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(201,168,76,0.12)"/>
      <stop offset="100%" stop-color="rgba(201,168,76,0)"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <ellipse cx="600" cy="315" rx="500" ry="300" fill="url(#glow)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="#c9a84c" opacity="0.6"/>

  <!-- Logo mark -->
  <text x="600" y="230" text-anchor="middle" font-family="Georgia, serif" font-size="96" font-weight="400" fill="#f0ece4" letter-spacing="-2">KWBA</text>
  <text x="600" y="232" text-anchor="middle" font-family="Georgia, serif" font-size="96" font-weight="400" fill="none" stroke="#c9a84c" stroke-width="0.5" letter-spacing="-2" opacity="0.4">KWBA</text>

  <!-- Gold dot separator -->
  <rect x="560" y="258" width="80" height="1" fill="#c9a84c" opacity="0.5"/>
  <circle cx="600" cy="258" r="3" fill="#c9a84c"/>

  <!-- Tagline -->
  <text x="600" y="320" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="28" font-weight="300" fill="#c9a84c" letter-spacing="1">Professional Web Design</text>

  <!-- Sub -->
  <text x="600" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="300" fill="#9a9488" letter-spacing="4">MILTON KEYNES · UK</text>

  <!-- Stats row -->
  <rect x="280" y="430" width="180" height="80" fill="rgba(201,168,76,0.06)" stroke="rgba(201,168,76,0.2)" stroke-width="1"/>
  <text x="370" y="465" text-anchor="middle" font-family="Georgia, serif" font-size="32" fill="#f0ece4">48hr</text>
  <text x="370" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#9a9488" letter-spacing="2">DELIVERY</text>

  <rect x="510" y="430" width="180" height="80" fill="rgba(201,168,76,0.06)" stroke="rgba(201,168,76,0.2)" stroke-width="1"/>
  <text x="600" y="465" text-anchor="middle" font-family="Georgia, serif" font-size="32" fill="#f0ece4">£800</text>
  <text x="600" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#9a9488" letter-spacing="2">FROM</text>

  <rect x="740" y="430" width="180" height="80" fill="rgba(201,168,76,0.06)" stroke="rgba(201,168,76,0.2)" stroke-width="1"/>
  <text x="830" y="465" text-anchor="middle" font-family="Georgia, serif" font-size="32" fill="#f0ece4">5★</text>
  <text x="830" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#9a9488" letter-spacing="2">REVIEWS</text>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="rgba(201,168,76,0.04)"/>
  <text x="600" y="611" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#6a6460" letter-spacing="3">KWBA.CO.UK · NO RETAINERS · RESULTS-FOCUSED</text>
</svg>
